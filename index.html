<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Calculadora Vanilla</title>
</head>
<body>
    <main class="container-main">
        <div class="container-calculadora">
            <div class="pantalla">
                <div class="pantalla-dividida">
                    <h2 class="input-valor operacion-ingresado"></h2>
                </div>
                <div class="pantalla-dividida">
                    <h2 class="input-valor input-num">0</h2>
                    <h2 class="input-valor result-operacion">0</h2>
                </div>
            </div>
            <div class="botones-calculadora">
                <button class="btn btn-fn all-clear" value="AC">AC</button>
                <!-- <button class="btn btn-fn" value="+/="><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-plus-equal"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 7h6" /><path d="M7 4v6" /><path d="M20 16h-6" /><path d="M20 19h-6" /><path d="M5 19l14 -14" /></svg></button> -->
                <button class="btn btn-fn" value="+/-"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-plus-equal"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 7h6" /><path d="M7 4v6" /><path d="M20 16h-6" /><path d="M5 19l14 -14" /></svg></button>
                <button class="btn btn-fn" value="%">%</button>
                <button class="btn btn-op" value="÷"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-divide"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M11 6a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" fill="currentColor" /><path d="M11 18a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" fill="currentColor" /><path d="M5 12l14 0" /></svg></button>
                <button class="btn btn-num" value="7">7</button>
                <button class="btn btn-num" value="8">8</button>
                <button class="btn btn-num" value="9">9</button>
                <button class="btn btn-op" value="x">x</button>
                <button class="btn btn-num" value="4">4</button>
                <button class="btn btn-num" value="5">5</button>
                <button class="btn btn-num" value="6">6</button>
                <button class="btn btn-op" value="-">-</button>
                <button class="btn btn-num" value="1">1</button>
                <button class="btn btn-num" value="2">2</button>
                <button class="btn btn-num" value="3">3</button>
                <button class="btn btn-op" value="+">+</button>
                <button class="btn btn-0 btn-num" value="0">0</button>
                <button class="btn btn-deci" value=".">.</button>
                <button class="btn btn-op" value="=">=</button>
            </div>
        </div>
    </main>
    <script src="js/scriptApp.js"></script>
</body>
</html>
